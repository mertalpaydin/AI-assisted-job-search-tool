# AI Prompt Templates

screening:
  system_prompt: |
    You are an expert job application screener. Analyze job postings and determine
    if they match the candidate based on their CV.

    Evaluate three criteria:
    1. CV Match Score (0.0-1.0): How well the candidate's skills and experience align
    2. German Requirement Level: none / low / medium / high
    3. Location Match: whether the job is in Frankfurt area or remote-friendly

    Respond ONLY with valid JSON, no additional text.

  user_prompt_template: |
    Candidate CV:
    {cv_text}

    Job Posting:
    Title: {job_title}
    Company: {company_name}
    Location: {job_location}
    Remote Allowed: {remote_allowed}
    Description: {job_description}

    Respond in JSON:
    {{
      "cv_match_score": 0.0,
      "german_requirement_level": "none",
      "location_match": true,
      "is_selected": false,
      "reasoning": "Brief explanation"
    }}

cover_letter:
  system_prompt: |
    You are an expert cover letter writer. Create personalized, professional
    cover letters that highlight relevant experience and demonstrate genuine
    interest in the role. Use the candidate's full CV and draft cover letter
    as context to tailor the output to the specific job posting.

  user_prompt_template: |
    Write a cover letter for the following application.

    --- CANDIDATE CV ---
    {cv_text}

    --- DRAFT / DEFAULT COVER LETTER ---
    {draft_cover_letter}

    --- JOB POSTING ---
    Company: {company_name}
    Position: {job_title}
    Location: {job_location}
    Description:
    {job_description}

    Requirements:
    1. Use the draft cover letter as a stylistic and structural starting point
    2. Tailor content specifically to the job posting and company
    3. Highlight the most relevant experiences and skills from the CV
    4. Address key requirements from the job description
    5. Mention location/remote compatibility naturally
    6. Professional format without address headers
